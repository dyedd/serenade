name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '<*_&`'
no-changes-template: '- No user-facing changes in this release.'
sort-by: merged_at
sort-direction: descending
exclude-labels:
  - skip-changelog

version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - feat
      - feature
      - enhancement
      - minor
  patch:
    labels:
      - fix
      - bug
      - bugfix
      - refactor
      - perf
      - patch
  default: patch

categories:
  - title: Features
    labels:
      - feat
      - feature
      - enhancement
  - title: Fixes
    labels:
      - fix
      - bug
      - bugfix
      - perf
  - title: Refactors
    labels:
      - refactor
  - title: Documentation
    labels:
      - docs
  - title: Maintenance
    labels:
      - chore
      - ci
      - build
      - dependencies
      - style
      - test

autolabeler:
  - label: feat
    title:
      - '/^feat(?:\(.+\))?:/i'
  - label: fix
    title:
      - '/^fix(?:\(.+\))?:/i'
  - label: refactor
    title:
      - '/^refactor(?:\(.+\))?:/i'
  - label: docs
    title:
      - '/^docs(?:\(.+\))?:/i'
  - label: chore
    title:
      - '/^chore(?:\(.+\))?:/i'
  - label: style
    title:
      - '/^style(?:\(.+\))?:/i'
  - label: test
    title:
      - '/^test(?:\(.+\))?:/i'
  - label: ci
    title:
      - '/^ci(?:\(.+\))?:/i'
  - label: build
    title:
      - '/^build(?:\(.+\))?:/i'
  - label: perf
    title:
      - '/^perf(?:\(.+\))?:/i'

template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
